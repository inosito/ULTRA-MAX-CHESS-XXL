<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-MAX-CHESS-XXL</title>
    <link rel="stylesheet" href="index.css">
    <script src="pieces.js"></script>
    <script src="chess.js"></script>
</head>
<body>
    <div id="nav">
        <button type="button" id="back" onclick="back()">←</button>
        <p>ULTRA-MAX-CHESS-XXL</p>
    </div>
    <div id="menu">
        <button type="button" id="classicBtn" onclick="initGame('classic')">Classic</button>
        <button type="button" id="blitzBtn" onclick="initGame('blitz')">Blitz</button>
        <button type="button" id="settingsBtn" onclick="initSettings()">Settings</button>
    </div>
    <div id="board">

    </div>
    <div id="options">
        <span id="status"></span>
        <button type="button" id="forfeitBtn" onclick="forfeit()">Forfeit</button>
        <button type="button" id="resetBtn" onclick="resetBoard()">Reset board</button>
        <div id="timerDisplay"></div>
    </div>
</body>
</html>
